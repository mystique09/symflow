name: CI

env:
  V_VERSION: f915d3efc4d2f1dfac8189c145c9fc4358b0e71b

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + vet + test
    runs-on: ubicloud-standard-4
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up and cache V
        uses: vlang/setup-v@v1.7
        with:
          version: ${{ env.V_VERSION }}
          cache: true

      - name: Show V diagnostics
        run: v doctor

      - name: Check formatting
        run: v fmt -verify bin symphony

      - name: Run V vet (lint)
        run: v vet bin symphony

      - name: Run tests
        run: v test symphony
